<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>OLMM — Off Load My Mind</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="app">
    <header class="topbar">
      <h1>OLMM</h1>
      <p class="tagline">Off Load My Mind</p>
    </header>

    <!-- מצב: לא מחובר -->
    <section id="login-view" class="view" hidden>
      <p class="lead">התחבר כדי להתחיל ללכוד.</p>
      <button id="login-btn" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22 22-9.8 22-22c0-1.3-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="M5.3 14.7l6.6 4.8C13.7 16 18.4 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 4.1 29.6 2 24 2 16.3 2 9.7 6.3 5.3 14.7z"/><path fill="#4CAF50" d="M24 46c5.5 0 10.5-2.1 14.2-5.5l-6.6-5.4C29.6 36.7 26.9 38 24 38c-5.2 0-9.6-3.3-11.3-8l-6.5 5C9.6 41.6 16.2 46 24 46z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.3 5.6l6.6 5.4C39.9 36.5 44 31 44 24c0-1.3-.1-2.3-.4-3.5z"/></svg>
        התחבר עם Google
      </button>
      <p id="config-warning" class="warning" hidden>
        ⚠️ עדיין לא הוגדרו פרטי Supabase ב-<code>config.js</code>.
      </p>
    </section>

    <!-- מצב: מחובר -->
    <section id="app-view" class="view" hidden>
      <div class="account-bar">
        <span id="user-email" class="user-email"></span>
        <button id="signout-btn" class="btn-text">התנתק</button>
      </div>
      <div class="placeholder">
        <p>🚧 מחובר! מסך ההקלטה מגיע בשלב 3.</p>
      </div>
    </section>
  </main>

  <script src="app.js" type="module"></script>
</body>
</html>
